{% load static %}

<!-- Start custom scripts for customizing admin form -->
<script src="{% static 'admin/plugins/ckeditor5/build/ckeditor.js' %}"></script>

<script>
    $(function(){
        var ckeditor_config = {
            fontSize: {
                options: [
                    12,
                    14,
                    16,
                    18,
                    'default'
                ]
            },
            toolbar: {
                items: [
                    'htmlEmbed',
                    '|',
                    'heading',
                    '|',
                    'removeFormat',
                    '|',
                    //'fontBackgroundColor',
                    'fontColor',
                    'bold',
                    'underline',
                    'italic',
                    'strikethrough',
                    'specialCharacters',
                    'link',
                    //'subscript',
                    'superscript',
                    'bulletedList',
                    'numberedList',
                    '|',
                    'fontSize',
                    //'fontFamily',
                    'alignment',
                    //'indent',
                    //'outdent',
                    '|',
                    'imageInsert',
                    'blockQuote',
                    'insertTable',
                    'mediaEmbed',
                    'undo',
                    'redo',
                    '|',
                    'code',
                    'horizontalLine'
                ]
            },
            language: 'it',
            image: {
                styles: [
                    'alignLeft', 'alignCenter', 'alignRight'
                ],

                // Configure the available image resize options.
                resizeOptions: [
                    {
                        name: 'imageResize:original',
                        label: 'Original',
                        value: null
                    },
                    {
                        name: 'imageResize:50',
                        label: '50%',
                        value: '50'
                    },
                    {
                        name: 'imageResize:75',
                        label: '75%',
                        value: '75'
                    }
                ],

                // You need to configure the image toolbar, too, so it shows the new style
                // buttons as well as the resize buttons.
                toolbar: [
                    'imageStyle:alignLeft', 'imageStyle:alignCenter', 'imageStyle:alignRight',
                    '|',
                    'imageResize',
                    '|',
                    'imageTextAlternative'
                ]
            },
            table: {
                contentToolbar: [
                    'tableColumn',
                    'tableRow',
                    'mergeTableCells',
                    'tableCellProperties',
                    'tableProperties'
                ]
            },
            //licenseKey: '',
            simpleUpload: {
                uploadUrl: '{% url "offadmin:ckeditor-image-upload" %}',
                headers: {
                    'X-Requested-With': 'XMLHttpRequest',
                    'X-CSRFToken': '{{ csrf_token }}',
                },
            },
            link: {
                decorators: {
                    openInNewTab: {
                        mode: 'manual',
                        label: 'Open in a new tab',
                        attributes: {
                            target: '_blank',
                            rel: 'noopener noreferrer'
                        }
                    }
                }
            }
        };

        $('.custom_ckeditor').each(function(){
            ClassicEditor
                .create(this, ckeditor_config)
                .then( editor => {
                    window.editor = editor;
                } )
                .catch( error => {
                    console.log( error );
                });
        });
    });
</script>
<!-- End custom scripts for customizing admin form -->
